name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      API_KEY: test
      NOVA_ENV_FILE: /dev/null

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_health.py \
            --ignore=tests/test_chat.py \
            --ignore=tests/test_announce.py \
            --ignore=tests/test_voice_milestone.py \
            --ignore=tests/test_heating_shadow_eval.py \
            --ignore=tests/test_perceptual_hash.py \
            -v --tb=short
