services:
  ollama:
    image: ollama/ollama:0.19.0
    container_name: avatar_ollama
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_HOST: 0.0.0.0:11434
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  intron_afro_tts:
    build:
      context: .
      dockerfile: intron_afro_tts_sidecar/Dockerfile
    container_name: avatar_intron_afro_tts
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "127.0.0.1:8021:8021"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN:-}
      INTRON_AFRO_TTS_MODEL_REPO: intronhealth/afro-tts
      INTRON_AFRO_TTS_MODEL_DIR: /models/intron_afro_tts
      INTRON_AFRO_TTS_REFERENCE_WAV: /models/intron_afro_tts/audios/reference_accent.wav
      INTRON_AFRO_TTS_LANGUAGE: en
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]
    volumes:
      - intron_afro_tts_models:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8021/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  music-assistant:
    image: ghcr.io/music-assistant/server@sha256:f25ab51703e81e18c90d023916d2bc7c8b1ef98b99503644fc12277bacc69ecd
    container_name: nova_music_assistant
    restart: unless-stopped
    network_mode: host
    volumes:
      - music_assistant_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8095/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
    driver: local
  intron_afro_tts_models:
    driver: local
  music_assistant_data:
    driver: local
